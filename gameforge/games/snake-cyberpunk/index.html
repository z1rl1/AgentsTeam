<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Киберпанк Змейка</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0014;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Courier New',monospace}h1{color:#ff00ff;font-size:2rem;margin-bottom:16px;text-shadow:0 0 20px #ff00ff}#score{color:#e0c0ff;font-size:1.2rem;margin-bottom:12px}canvas{border:2px solid #ff00ff;box-shadow:0 0 30px #ff00ff44}#msg{color:#ff00ff;font-size:1.1rem;margin-top:14px}</style>
</head><body><h1>Киберпанк Змейка</h1><div id="score">Счёт: 0</div>
<canvas id="c" width="400" height="400"></canvas>
<div id="msg">Нажми Enter чтобы начать</div>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const SZ=20,COLS=20,ROWS=20,ACCENT='#ff00ff',BG2='#0d001a',FOOD='#00ffff';
let snake,dir,next,food,score,loop,running=false;
function init(){snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];dir={x:1,y:0};next={x:1,y:0};food=rnd();score=0;running=true;document.getElementById('score').textContent='Счёт: 0';document.getElementById('msg').textContent='';if(loop)clearInterval(loop);loop=setInterval(tick,120);}
function rnd(){return{x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
function tick(){dir=next;const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS||snake.some(s=>s.x===h.x&&s.y===h.y)){clearInterval(loop);running=false;document.getElementById('msg').textContent='Конец! Enter - заново';return;}snake.unshift(h);if(h.x===food.x&&h.y===food.y){score+=10;document.getElementById('score').textContent='Счёт: '+score;food=rnd();}else snake.pop();draw();}
function draw(){ctx.fillStyle=BG2;ctx.fillRect(0,0,400,400);ctx.strokeStyle='#ffffff08';for(let i=0;i<=20;i++){ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,400);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*SZ);ctx.lineTo(400,i*SZ);ctx.stroke();}ctx.fillStyle=FOOD;ctx.shadowColor=FOOD;ctx.shadowBlur=15;ctx.fillRect(food.x*SZ+2,food.y*SZ+2,SZ-4,SZ-4);ctx.shadowBlur=0;snake.forEach((s,i)=>{ctx.fillStyle=i===0?ACCENT:'#666';ctx.shadowColor=ACCENT;ctx.shadowBlur=i===0?12:0;ctx.fillRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2);});ctx.shadowBlur=0;}
ctx.fillStyle=BG2;ctx.fillRect(0,0,400,400);ctx.fillStyle=ACCENT;ctx.font='bold 28px Courier New';ctx.textAlign='center';ctx.shadowColor=ACCENT;ctx.shadowBlur=20;ctx.fillText('Киберпанк Змейка',200,200);ctx.shadowBlur=0;
document.addEventListener('keydown',e=>{if((e.code==='Enter'||e.code==='Space')&&!running){init();return;}if(!running)return;if(e.code==='ArrowUp'&&dir.y===0)next={x:0,y:-1};if(e.code==='ArrowDown'&&dir.y===0)next={x:0,y:1};if(e.code==='ArrowLeft'&&dir.x===0)next={x:-1,y:0};if(e.code==='ArrowRight'&&dir.x===0)next={x:1,y:0};});
</script></body></html>
